# Environment (used for credentials folder)
ENVIRONMENT: staging

# General environment variables
BASE_URL: https://staging.example.com
APPIUM_PORT: 4723
MAX_INSTANCES: 1

# App configurations
APP_CONFIG:
  ANDROID:
    DEFAULT_APP:
      APP: .app/android/saucedemo.apk
      APP_PACKAGE: com.saucelabs.mydemoapp.android
    TEST_APP:
      APP: .app/android/test.apk
      APP_PACKAGE: com.test.mydemoapp.android
  IOS:
    DEFAULT_APP:
      APP: .app/ios/saucedemo.app
      APP_PACKAGE: com.saucelabs.mydemoapp.rn
    TEST_APP:
      APP: .app/ios/test.app
      APP_PACKAGE: com.test.mydemoapp.rn
